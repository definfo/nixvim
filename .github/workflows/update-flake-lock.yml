name: Update flake.lock weekly

on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: "0 6 * * 0" # runs weekly on Sunday 06:00 UTC

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        run: |
          git init .
          git remote add origin "${GITHUB_EVENT_REPOSITORY_CLONE_URL}"
          git -c credential.helper='!f() { echo username=x-access-token; echo password=${{ github.token }}; }; f' \
              fetch --depth=1 origin "${{ github.sha }}"
          git checkout FETCH_HEAD
        env:
          GITHUB_EVENT_REPOSITORY_CLONE_URL: ${{ github.event.repository.clone_url }}
      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@63ca48f939ee3b8d835f4126562537df0fee5b91 # v32
      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@428c2b58a4b7414dabd372acb6a03dba1084d3ab # v25
        with:
          pr-title: "bump: update flake.lock"
          pr-labels: |
            dependencies
            auto-merge
