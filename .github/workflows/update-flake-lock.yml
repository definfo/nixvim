name: Update flake.lock weekly

on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: "0 6 * * 0" # runs weekly on Sunday 06:00 UTC

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: definfo/checkout-action@feat-priv
      - name: Install Nix
        uses: cachix/install-nix-action@51f3067b56fe8ae331890c77d4e454f6d60615ff # v31.10.2
      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          pr-title: "bump: update flake.lock"
          pr-labels: |
            dependencies
            auto-merge
